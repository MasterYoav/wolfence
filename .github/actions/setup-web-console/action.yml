name: Setup Web Console
description: Prepare the Wolfence web console and Rust workspace for CI verification.

inputs:
  install-browser:
    description: Install a Chrome-for-Testing browser for Puppeteer.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: apps/web-console/package-lock.json

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2

    - name: Install web console dependencies
      shell: bash
      working-directory: apps/web-console
      run: npm ci

    - name: Build web console
      shell: bash
      working-directory: apps/web-console
      run: npm run build

    - name: Install headless browser for Puppeteer
      if: inputs.install-browser == 'true'
      shell: bash
      working-directory: apps/web-console
      run: npx puppeteer browsers install chrome
